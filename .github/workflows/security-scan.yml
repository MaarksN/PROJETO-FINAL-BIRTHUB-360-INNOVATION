name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "codex/**"

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep (typescript + express)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/expressjs

  dependency-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  python-security:
    name: python-security
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt bandit pip-audit "safety>=3.7.0"

      - name: Enforce Python workflow hard-fail policy
        run: python scripts/ci/check-python-workflow-hard-fail.py

      - name: Run Bandit
        run: python -m bandit -q -r agents apps/webhook-receiver -x "*/tests/*" -lll

      - name: Run pip-audit
        run: python -m pip_audit -r requirements-test.txt --ignore-vuln CVE-2026-4539

      - name: Run Safety
        run: python -m safety check --full-report -r requirements-test.txt

  rbac-suite:
    name: RBAC suite
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birthub_cycle3
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d birthub_cycle3"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle3

      - name: Run RBAC tests
        run: pnpm test:rbac
        env:
          API_CORS_ORIGINS: http://localhost:3001
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle3
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-secret
          WEB_BASE_URL: http://localhost:3001

  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build canonical web target
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_CSP_REPORT_ONLY: "true"
          NEXT_PUBLIC_ENVIRONMENT: test
        run: pnpm --filter @birthub/web build

      - name: Start canonical web target
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/security/zap
          pnpm --filter @birthub/web start > artifacts/security/zap/web-server.log 2>&1 &
          echo "$!" > artifacts/security/zap/web-server.pid

      - name: Wait for canonical web target
        shell: bash
        run: |
          set -euo pipefail
          target_url="http://127.0.0.1:3001/login"
          for attempt in {1..60}; do
            if curl --silent --show-error --fail "$target_url" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Canonical web target did not become ready for ZAP baseline." >&2
          exit 1

      - name: ZAP baseline scan
        id: zap
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/security/zap
          docker run --rm --network host \
            -v "${PWD}/artifacts/security/zap:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://127.0.0.1:3001/login \
            -J zap-report.json \
            -r zap-report.html \
            -w zap-report.md \
            -a

      - name: Stop canonical web target
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f artifacts/security/zap/web-server.pid ]]; then
            pid="$(cat artifacts/security/zap/web-server.pid)"
            kill "$pid" 2>/dev/null || true
          fi

      - name: Upload ZAP artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-baseline-artifacts
          path: |
            artifacts/security/zap

  security-report:
    name: security coverage report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    needs:
      - semgrep
      - dependency-audit
      - python-security
      - rbac-suite
      - zap-baseline
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify auth guards
        run: pnpm security:guards

      - name: Generate security report
        run: pnpm security:report
        env:
          DAST_TARGET_STRATEGY: local-web-login-route
          DAST_TARGET_URL: http://127.0.0.1:3001/login
          NPM_AUDIT_STATUS: ${{ needs.dependency-audit.result }}
          PYTHON_SECURITY_STATUS: ${{ needs.python-security.result }}
          RBAC_STATUS: ${{ needs.rbac-suite.result }}
          SEMGREP_STATUS: ${{ needs.semgrep.result }}
          ZAP_STATUS: ${{ needs.zap-baseline.result }}

      - name: Upload security report
        uses: actions/upload-artifact@v7
        with:
          name: security-coverage-report
          path: |
            docs/security/security-coverage-report.md
            artifacts/security/security-coverage-report.json
