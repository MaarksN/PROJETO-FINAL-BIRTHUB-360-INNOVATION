name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: commitlint
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm ci:commitlint
      fetch_depth: 0
      timeout_minutes: 10

  lockfile-integrity:
    name: lockfile-integrity
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm ci:lockfile
      timeout_minutes: 15

  inline-credentials:
    name: inline-credentials
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm security:inline-credentials
      timeout_minutes: 10

  pr-size:
    name: pr-size
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm ci:pr-size
      timeout_minutes: 10

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-guardrails:
    name: security-guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birthub_cycle1
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d birthub_cycle1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1

      - name: Enforce security guardrails
        run: pnpm ci:security-guardrails
        env:
          API_CORS_ORIGINS: http://localhost:3001
          API_PORT: 3000
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_ENVIRONMENT: ci
          NODE_ENV: test
          QUEUE_NAME: birthub-cycle1
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-secret
          WEB_BASE_URL: http://localhost:3001

  platform:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        task:
          - lint
          - typecheck
          - test
          - test:isolation
          - build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birthub_cycle1
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d birthub_cycle1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.task }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.task }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1

      - name: Run ${{ matrix.task }}
        run: pnpm ci:task ${{ matrix.task }}
        env:
          API_CORS_ORIGINS: http://localhost:3001
          API_PORT: 3000
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_ENVIRONMENT: ci
          NODE_ENV: test
          QUEUE_NAME: birthub-cycle1
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-secret
          WEB_BASE_URL: http://localhost:3001

  satellites:
    name: satellites
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          find agents apps -name requirements.txt -print0 | xargs -0 -n1 python -m pip install -r
          python -m pip install -r requirements-test.txt pytest pytest-asyncio pytest-cov

      - name: Run satellites lane
        run: pnpm ci:task satellites

  legacy-agents:
    name: legacy-agents
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          find agents -name requirements.txt -print0 | xargs -0 -n1 python -m pip install -r
          python -m pip install -r requirements-test.txt pytest pytest-asyncio pytest-cov

      - name: Enforce Python ignore policy
        run: pnpm ci:python-ignore-guard

      - name: Run legacy agents coverage gate
        run: pnpm test:coverage

  workflow-suite:
    name: workflow-suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          find agents apps -name requirements.txt -print0 | xargs -0 -n1 python -m pip install -r
          python -m pip install -r requirements-test.txt pytest pytest-asyncio pytest-cov ruff mypy bandit pip-audit "safety==2.3.1"

      - name: Enforce Python lint and typecheck
        run: |
          ruff check agents apps/webhook-receiver
          mypy --strict agents/shared apps/webhook-receiver/src

      - name: Enforce type-comment guard
        run: pnpm ci:ts-comment-guard

      - name: Enforce Python security gates
        run: |
          bandit -q -r agents apps/webhook-receiver
          pip-audit
          safety check --full-report

      - name: Run Python workflow tests
        run: pytest apps/agent-orchestrator/tests apps/webhook-receiver/tests

      - name: Run workflow suite
        run: pnpm ci:task workflow-suite

  pack-tests:
    name: pack-tests
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm ci:task pack-tests
      timeout_minutes: 20

  governance-gates:
    name: governance-gates
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm monorepo:doctor && pnpm release:scorecard
      timeout_minutes: 15

  meta-ci:
    name: meta-ci
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm ci:workflow-audit && pnpm ci:ts-comment-guard
      timeout_minutes: 15

  license-check:
    name: license-check
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm ci:license-check
      timeout_minutes: 15

  container-security:
    name: container-security (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: web
            dockerfile: apps/web/Dockerfile
            tag: birthhub-web:ci
          - name: api
            dockerfile: apps/api/Dockerfile
            tag: birthhub-api:ci
          - name: worker
            dockerfile: apps/worker/Dockerfile
            tag: birthhub-worker:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build container image
        run: docker build -f ${{ matrix.image.dockerfile }} -t ${{ matrix.image.tag }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ matrix.image.tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - commitlint
      - lockfile-integrity
      - inline-credentials
      - pr-size
      - gitleaks
      - security-guardrails
      - platform
      - satellites
      - legacy-agents
      - workflow-suite
      - pack-tests
      - governance-gates
      - meta-ci
      - license-check
      - container-security
    steps:
      - name: Done
        run: echo "All required checks passed."
