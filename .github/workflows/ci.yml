name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-name:
    name: branch-name
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm branch:check
      timeout_minutes: 10

  commit-messages:
    name: commit-messages
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm commits:check
      fetch_depth: 0
      timeout_minutes: 10

  lockfile-integrity:
    name: lockfile-integrity
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm ci:lockfile
      timeout_minutes: 15

  inline-credentials:
    name: inline-credentials
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm security:inline-credentials
      timeout_minutes: 10

  documentation-links:
    name: documentation-links
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm docs:check-links
      timeout_minutes: 15

  repo-hygiene:
    name: repo-hygiene
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm hygiene:check
      fetch_depth: 0
      timeout_minutes: 20

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-guardrails:
    name: security-guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birthub_cycle1
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d birthub_cycle1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1

      - name: Enforce security guardrails
        run: pnpm ci:security-guardrails
        env:
          API_CORS_ORIGINS: http://localhost:3001
          API_PORT: 3000
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_ENVIRONMENT: ci
          NODE_ENV: test
          QUEUE_NAME: birthub-cycle1
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-secret
          WEB_BASE_URL: http://localhost:3001

  platform:
    name: platform (${{ matrix.task }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        task:
          - lint
          - typecheck
          - test
          - test:isolation
          - build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: birthub_cycle1
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d birthub_cycle1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.task }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.task }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1

      - name: Run ${{ matrix.task }}
        run: pnpm ci:task ${{ matrix.task }}
        env:
          API_CORS_ORIGINS: http://localhost:3001
          API_PORT: 3000
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/birthub_cycle1
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_ENVIRONMENT: ci
          NODE_ENV: test
          QUEUE_NAME: birthub-cycle1
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-secret
          WEB_BASE_URL: http://localhost:3001

  satellites:
    name: satellites
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run satellites lane
        run: pnpm ci:task satellites

  legacy-agents:
    name: legacy-agents
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          find agents -name requirements.txt -print0 | xargs -0 -n1 python -m pip install -r
          python -m pip install -r requirements-test.txt pytest pytest-asyncio pytest-cov

      - name: Run legacy agents lane
        run: pnpm ci:task legacy-agents

  workflow-suite:
    name: workflow-suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workflow suite
        run: pnpm ci:task workflow-suite

  pack-tests:
    name: pack-tests
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm ci:task pack-tests
      timeout_minutes: 20

  governance-gates:
    name: governance-gates
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      command: pnpm monorepo:doctor && pnpm release:scorecard
      timeout_minutes: 15

  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - branch-name
      - commit-messages
      - lockfile-integrity
      - inline-credentials
      - documentation-links
      - repo-hygiene
      - gitleaks
      - security-guardrails
      - platform
      - satellites
      - legacy-agents
      - workflow-suite
      - pack-tests
      - governance-gates
    steps:
      - name: Done
        run: echo "All required checks passed."
