name: CI

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate agent pack manifests
        run: pnpm validate:manifests

      - name: Run monorepo tests
        run: pnpm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/shared/requirements.txt
          find agents -maxdepth 2 -name requirements.txt -print0 | xargs -0 -I{} pip install -r {}

      - name: Run Python tests
        run: pytest -q
