name: Release Rehearsal

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cycle0-rehearsal:
    name: cycle0-rehearsal
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run recurring release rehearsal
        run: pnpm release:verify:cycle0

      - name: Upload rehearsal artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-rehearsal
          path: |
            artifacts/release/cycle0-flow-summary.*
            artifacts/release/checksums-manifest.sha256
            artifacts/release/release-artifact-catalog.json
            artifacts/release/source-manifest.json
            releases/manifests/release_artifact_catalog.md
            releases/notes/v1.0.0.md
