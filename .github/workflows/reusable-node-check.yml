name: Reusable Node Check

on:
  workflow_call:
    inputs:
      command:
        required: true
        type: string
      fetch_depth:
        default: 1
        required: false
        type: number
      timeout_minutes:
        default: 20
        required: false
        type: number

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch_depth }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          standalone: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Restore Next.js build cache
        if: contains(inputs.command, 'test:e2e')
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('apps/web/package.json', 'apps/web/next.config.*', 'apps/web/tsconfig.*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: contains(inputs.command, 'test:e2e')
        run: pnpm exec playwright install --with-deps chromium

      - name: Prisma diagnostics
        run: |
          node -e "const pkg=require('./packages/database/package.json'); console.log('prisma(dev):', pkg.devDependencies?.prisma ?? 'missing'); console.log('@prisma/client(dep):', pkg.dependencies?.['@prisma/client'] ?? 'missing');"
          pnpm ls @prisma/client
          pnpm ls prisma
          cat packages/database/prisma/schema.prisma | grep -A 5 datasource || true
          sha256sum packages/database/prisma/schema.prisma || true

      - name: Run command
        env:
          WORKFLOW_COMMAND: ${{ inputs.command }}
        run: |
          if [ "$WORKFLOW_COMMAND" = "pnpm test:e2e:release" ]; then
              pnpm --filter @birthub/web build
              pnpm exec playwright test tests/e2e/smoke.spec.ts
              pnpm test:e2e:release
          else
              eval "$WORKFLOW_COMMAND"
          fi

      - name: Upload Playwright Report
        if: failure() && contains(inputs.command, 'test:e2e')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure() && contains(inputs.command, 'test:e2e')
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
