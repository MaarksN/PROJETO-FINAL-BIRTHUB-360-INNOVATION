name: F4 Script Compliance

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  workspace-compliance:
    name: workspace-compliance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace audit
        run: pnpm workspace:audit

      - name: Upload compliance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: f4-script-compliance
          path: |
            artifacts/script-compliance/**
            docs/standards/package-script-status.md

  legacy-agent-lane:
    name: legacy-agent-lane
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect legacy Python agent surface
        id: legacy_surface
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d agents ]] && find agents -type f \( -name '*.py' -o -name '*.ts' \) -print -quit | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Python dependencies
        if: steps.legacy_surface.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt pytest mypy ruff "fastapi==0.115.0" "starlette<0.39.0"

      - name: Enforce Python workflow hard-fail policy
        run: python scripts/ci/check-python-workflow-hard-fail.py

      - name: Skip legacy Python bootstrap
        if: steps.legacy_surface.outputs.present != 'true'
        run: echo "No tracked legacy Python agent surface was found in this checkout."

      - name: Run agent lint
        run: pnpm lint:agents

      - name: Run agent typecheck lane
        run: pnpm typecheck:agents

      - name: Run agent package tests
        run: pnpm test:agents:packages

      - name: Run agent build lane
        run: pnpm build:agents
