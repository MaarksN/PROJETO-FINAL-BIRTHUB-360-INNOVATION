name: F4 Script Compliance

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  workspace-compliance:
    name: workspace-compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace audit
        run: pnpm workspace:audit

      - name: Upload compliance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: f4-script-compliance
          path: |
            artifacts/script-compliance/**
            docs/standards/package-script-status.md

  legacy-agent-lane:
    name: legacy-agent-lane
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          find agents -name requirements.txt -print0 | xargs -0 -n1 python -m pip install -r
          python -m pip install pytest

      - name: Run agent lint
        run: pnpm lint:agents

      - name: Run agent typecheck lane
        run: pnpm typecheck:agents

      - name: Run agent package tests
        run: pnpm test:agents:packages

      - name: Run agent build lane
        run: pnpm build:agents
