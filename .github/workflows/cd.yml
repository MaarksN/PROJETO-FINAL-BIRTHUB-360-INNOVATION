name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Ambiente de deploy"
        required: true
        default: "production"
        type: choice
        options:
          - production

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy staging (automático)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger Render deploy hook (staging)
        env:
          RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_STAGING_DEPLOY_HOOK_URL" ]; then
            echo "Secret RENDER_STAGING_DEPLOY_HOOK_URL não configurado" >&2
            exit 1
          fi
          curl --fail --show-error --silent --request POST "$RENDER_STAGING_DEPLOY_HOOK_URL"

  deploy-production:
    name: Deploy production (aprovação manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render deploy hook (production)
        env:
          RENDER_PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_PRODUCTION_DEPLOY_HOOK_URL" ]; then
            echo "Secret RENDER_PRODUCTION_DEPLOY_HOOK_URL não configurado" >&2
            exit 1
          fi
          curl --fail --show-error --silent --request POST "$RENDER_PRODUCTION_DEPLOY_HOOK_URL"
