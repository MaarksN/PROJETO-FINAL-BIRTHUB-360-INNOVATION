groups:
  - name: birthub-slo-alerts
    rules:
      - alert: ApiGatewayDown
        expr: up{job="api-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          slo: availability
          sla_severity: P0
          owner_primary: platform-api
          owner_backup: platform-architecture
          communication_channel: bh360-api-ownership
        annotations:
          summary: "API Gateway indisponível"

      - alert: ApiGatewayHighErrorBudgetBurn
        expr: rate(http_requests_total{job="api-gateway",status=~"5.."}[5m]) / clamp_min(rate(http_requests_total{job="api-gateway"}[5m]), 0.001) > 0.001
        for: 10m
        labels:
          severity: critical
          slo: availability
          sla_severity: P1
          owner_primary: platform-api
          owner_backup: platform-architecture
          communication_channel: bh360-api-ownership
        annotations:
          summary: "Burn rate de erro acima do orçamento de 99.9%"

      - alert: ApiGatewayUptimeSLOBreach
        expr: (1 - (rate(http_requests_total{job="api-gateway",status=~"5.."}[5m]) / clamp_min(rate(http_requests_total{job="api-gateway"}[5m]), 0.001))) < 0.999
        for: 15m
        labels:
          severity: warning
          slo: availability
          sla_severity: P1
          owner_primary: platform-api
          owner_backup: platform-architecture
          communication_channel: bh360-api-ownership
        annotations:
          summary: "Disponibilidade efetiva abaixo de 99.9%"

      - alert: ApiGatewayP99LatencySLOBreach
        expr: histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{job="api-gateway"}[5m]))) > 0.3
        for: 15m
        labels:
          severity: critical
          slo: latency
          sla_severity: P1
          owner_primary: platform-api
          owner_backup: platform-architecture
          communication_channel: bh360-api-ownership
        annotations:
          summary: "Latência p99 acima de 300ms"

      - alert: Webhook429Spike
        expr: rate(http_requests_total{job="api-gateway",status="429"}[10m]) > 3
        for: 10m
        labels:
          severity: warning
          slo: saturation
          sla_severity: P2
          owner_primary: platform-api
          owner_backup: platform-architecture
          communication_channel: bh360-api-ownership
        annotations:
          summary: "Spike de rate limiting detectado em endpoints expostos"

      - alert: ApiUnauthorizedSpike
        expr: rate(http_requests_total{job="api",status=~"401|403"}[10m]) > 5
        for: 10m
        labels:
          severity: warning
          slo: security
          sla_severity: P2
          owner_primary: platform-architecture
          owner_backup: platform-api
          communication_channel: bh360-security-ownership
        annotations:
          summary: "Spike de 401/403 na API principal após endurecimento de auth/tenant"

      - alert: ApiBudgetExceededSpike
        expr: rate(http_requests_total{job="api",status="402"}[10m]) > 1
        for: 10m
        labels:
          severity: warning
          slo: finops
          sla_severity: P2
          owner_primary: platform-api
          owner_backup: platform-architecture
          communication_channel: bh360-api-ownership
        annotations:
          summary: "Spike de 402 indica bloqueios de budget ou regressão em custos"

      - alert: ApiTaskIngestionRejections
        expr: rate(http_requests_total{job="api",path="/api/v1/tasks",status=~"401|402|429|503"}[10m]) > 1
        for: 10m
        labels:
          severity: warning
          slo: security
          sla_severity: P1
          owner_primary: platform-api
          owner_backup: platform-automation
          communication_channel: bh360-worker-ownership
        annotations:
          summary: "Rejeições anormais em /api/v1/tasks após fechamento da ingestão autenticada"

  - name: birthub-sla-governance
    rules:
      - alert: SlaAtRiskP0
        expr: sum(ALERTS{alertstate="firing",sla_severity="P0",alertname!~"SlaAtRiskP[0-3]|SlaBreachedP[0-3]"}) > 0
        for: 90m
        labels:
          severity: warning
          sla_severity: P0
          sla_state: at_risk_75
          escalation_target: owner_primary_owner_backup
        annotations:
          summary: "SLA P0 em risco (>=75% do prazo)"
          description: "Incidente P0 ativo por pelo menos 90 minutos sem encerramento."

      - alert: SlaBreachedP0
        expr: sum(ALERTS{alertstate="firing",sla_severity="P0",alertname!~"SlaAtRiskP[0-3]|SlaBreachedP[0-3]"}) > 0
        for: 2h
        labels:
          severity: critical
          sla_severity: P0
          sla_state: breached_100
          escalation_target: cto_engineering_manager_platform_architecture
        annotations:
          summary: "SLA P0 violado"
          description: "Incidente P0 ativo por 2 horas ou mais."

      - alert: SlaAtRiskP1
        expr: sum(ALERTS{alertstate="firing",sla_severity="P1",alertname!~"SlaAtRiskP[0-3]|SlaBreachedP[0-3]"}) > 0
        for: 6h
        labels:
          severity: warning
          sla_severity: P1
          sla_state: at_risk_75
          escalation_target: owner_primary_owner_backup
        annotations:
          summary: "SLA P1 em risco (>=75% do prazo)"
          description: "Incidente P1 ativo por pelo menos 6 horas sem encerramento."

      - alert: SlaBreachedP1
        expr: sum(ALERTS{alertstate="firing",sla_severity="P1",alertname!~"SlaAtRiskP[0-3]|SlaBreachedP[0-3]"}) > 0
        for: 8h
        labels:
          severity: critical
          sla_severity: P1
          sla_state: breached_100
          escalation_target: engineering_manager_platform_architecture
        annotations:
          summary: "SLA P1 violado"
          description: "Incidente P1 ativo por 8 horas ou mais."

      - alert: SlaAtRiskP2
        expr: sum(ALERTS{alertstate="firing",sla_severity="P2",alertname!~"SlaAtRiskP[0-3]|SlaBreachedP[0-3]"}) > 0
        for: 54h
        labels:
          severity: warning
          sla_severity: P2
          sla_state: at_risk_75
          escalation_target: owner_primary_owner_backup
        annotations:
          summary: "SLA P2 em risco (>=75% do prazo)"
          description: "Incidente P2 ativo por pelo menos 54 horas sem encerramento."

      - alert: SlaBreachedP2
        expr: sum(ALERTS{alertstate="firing",sla_severity="P2",alertname!~"SlaAtRiskP[0-3]|SlaBreachedP[0-3]"}) > 0
        for: 72h
        labels:
          severity: critical
          sla_severity: P2
          sla_state: breached_100
          escalation_target: engineering_manager_domain_owner
        annotations:
          summary: "SLA P2 violado"
          description: "Incidente P2 ativo por 72 horas ou mais."

      - alert: SlaAtRiskP3
        expr: sum(ALERTS{alertstate="firing",sla_severity="P3",alertname!~"SlaAtRiskP[0-3]|SlaBreachedP[0-3]"}) > 0
        for: 252h
        labels:
          severity: warning
          sla_severity: P3
          sla_state: at_risk_75
          escalation_target: owner_primary_owner_backup
        annotations:
          summary: "SLA P3 em risco (>=75% do prazo)"
          description: "Incidente P3 ativo por pelo menos 10 dias e 12 horas."

      - alert: SlaBreachedP3
        expr: sum(ALERTS{alertstate="firing",sla_severity="P3",alertname!~"SlaAtRiskP[0-3]|SlaBreachedP[0-3]"}) > 0
        for: 336h
        labels:
          severity: critical
          sla_severity: P3
          sla_state: breached_100
          escalation_target: domain_owner_sprint_planning
        annotations:
          summary: "SLA P3 violado"
          description: "Incidente P3 ativo por 2 semanas ou mais."
