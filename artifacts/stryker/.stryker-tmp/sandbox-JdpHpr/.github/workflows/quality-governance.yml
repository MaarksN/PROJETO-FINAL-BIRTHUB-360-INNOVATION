name: Quality Governance

on:
  schedule:
    - cron: "0 9 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  complexity-baseline:
    name: complexity-baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate quality baselines
        run: pnpm quality:complexity && pnpm quality:web-bundle && pnpm report:regression-zero

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-baselines
          path: |
            artifacts/quality
            docs/evidence/regression-zero.md

  dead-code:
    name: dead-code
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect dead code candidates
        run: pnpm quality:dead-code

  mutation:
    name: mutation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Stryker
        run: pnpm test:mutation

      - name: Upload Stryker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-artifacts
          path: artifacts/stryker
